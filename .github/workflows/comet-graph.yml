name: comet-graph
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
concurrency:
  group: comet-graph
  cancel-in-progress: true
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          username: kiaquila
