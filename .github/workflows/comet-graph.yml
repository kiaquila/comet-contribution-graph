name: comet-graph
on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "dist-action/**"
      - "action.yml"
      - "scripts/fetch-contributions.mjs"
  workflow_dispatch:
concurrency:
  group: comet-graph
  cancel-in-progress: true
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          username: kiaquila
