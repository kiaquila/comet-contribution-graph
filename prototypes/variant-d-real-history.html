<html lang="en">

    <title>kiaquila — contribution sky (2018–2026)</title>

      rel="stylesheet"
    />
    <style>
      /* §1 — tunables */
      :root {
        --comet-duration: 3.36s; /* traversal */
        --comet-hold: 1.5s;
        --comet-head-r: 4px;
        --comet-head-color: #ffffff;
        --comet-trail-width: 2px;
        --comet-tail-len: 70;
        --jitter-amp: 0.32;
        --star-r-min: 0.8;
        --star-r-max: 3;
        --peak-r-base: 3.6;
        --peak-r-step: 0.35;
      }

      body {
        margin: 0;
        padding: 40px;
        background-color: #010209;
        background-image:
          radial-gradient(
            circle at 50% -20%,
            rgba(26, 42, 74, 0.6) 0%,
            transparent 60%
          ),
          radial-gradient(
            circle at 80% 120%,
            rgba(42, 26, 58, 0.4) 0%,
            transparent 50%
          );
        font-family: "Space Mono", monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 60px;
      }

      .header {
        text-align: center;
        color: #7aacd8;
      }
      .header h1 {
        color: #ffffff;
        font-size: 20px;
        margin: 0 0 8px 0;
      }
      .header p {
        font-size: 14px;
        margin: 0;
        max-width: 640px;
        line-height: 1.5;
      }

      .user-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        width: 100%;
      }
      .user-header {
        text-align: center;
      }
      .user-header h2 {
        color: #ffffff;
        font-size: 16px;
        font-weight: 700;
        margin: 0 0 4px 0;
        letter-spacing: 0.05em;
      }
      .user-header p {
        color: #7aacd8;
        font-size: 12px;
        margin: 0;
        opacity: 0.7;
      }

      .year-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .year-section h2 {
        color: #7aacd8;
        font-size: 13px;
        font-weight: 400;
        margin: 0;
        opacity: 0.85;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .graph-wrapper {
        position: relative;
        display: flex;
        background: rgba(1, 2, 9, 0.4);
        border: 1px solid rgba(122, 172, 216, 0.1);
        border-radius: 12px;
        padding: 40px 30px 30px 40px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
      }

      .labels-y {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 112px;
        font-size: 10px;
        color: #7aacd8;
        padding-right: 15px;
        margin-top: 6px;
        opacity: 0.8;
      }

      .labels-x {
        position: absolute;
        top: 15px;
        left: 85px;
        font-size: 10px;
        color: #7aacd8;
        opacity: 0.8;
      }
      .month-label {
        position: absolute;
      }

      .svg-container {
        height: 112px;
        position: relative;
      }

      .sky-svg {
        position: absolute;
        top: -10px;
        left: -10px;
        height: 132px;
        overflow: visible;
      }

      .bg-star {
        opacity: 0.15;
        animation: twinkle 4s infinite alternate;
      }
      .data-star {
        transition: r 0.3s ease;
      }
      .peak-halo {
        animation: halo-pulse 2s infinite alternate;
      }

      .comet-trail-path {
        fill: none;
        stroke-width: var(--comet-trail-width, 2px);
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .constellation-path {
        fill: none;
        stroke: rgba(255, 255, 255, 0.1);
        stroke-width: 1;
        stroke-linejoin: round;
      }

      .empty-sky {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 112px;
        color: rgba(122, 172, 216, 0.3);
        font-size: 12px;
        font-style: italic;
        min-width: 300px;
      }

      @keyframes twinkle {
        0% {
          opacity: 0.05;
        }
        100% {
          opacity: 0.3;
        }
      }
      @keyframes halo-pulse {
        0% {
          fill-opacity: 0.25;
        }
        100% {
          fill-opacity: 0.45;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .bg-star {
          animation: none;
          opacity: 0.15;
        }
        .peak-star {
          animation: none;
        }
        .peak-halo {
          animation: none;
        }
        .comet-head {
          display: none;
        }
      }
    </style>
  </head>

        traces the year&#39;s rhythm.

          d.setDate(start.getDate() + i);
          const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;

          days.push([key, map[key] || 0]);

      // ── Deterministic PRNG (Mulberry32) ──────────────────────────────────
      function makePRNG(initSeed) {
        let s = initSeed;
        return function rng() {
          let t = (s += 0x6d2b79f5);
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

        const t = Math.min(count, 10) / 10;
        const s = lerp(42, 72, t);
        const l = lerp(28, 82, t);
        return `hsl(214,${s.toFixed(0)}%,${l.toFixed(0)}%)`;
      }
      function nonPeakOpacity(count) {
        return 0.45 + Math.min(count, 10) * 0.05;
      }
      function peakFill(count) {
        if (count > 19) {
          return `hsl(48,100%,92%)`;
        }
        const l = lerp(68, 86, (count - 15) / 4);
        return `hsl(48,100%,${l.toFixed(1)}%)`;

        if (count <= 17) return `url(#halo-sm-${v})`;

      function buildMonthLabelsForYear(containerId, year, numCols) {
        const div = document.getElementById(containerId);
        let lastMonth = -1;
        // Walk day-by-day in the year to find month boundaries
        const isLeap = (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
        const totalDays = isLeap ? 366 : 365;
        // Jan 1 of the year: get day-of-week (0=Sun)
        const jan1 = new Date(year, 0, 1);
        // Column of day index d: floor((startDow + d) / 7)
        const startDow = jan1.getDay();
        for (let d = 0; d < totalDays; d++) {
          const col = Math.floor((startDow + d) / 7);
          if (col >= numCols) break;
          const date = new Date(year, 0, d + 1);
          const month = date.getMonth();
          if (month !== lastMonth) {
            lastMonth = month;
            const span = document.createElement("span");
            span.className = "month-label";
            span.textContent = MONTHS[month];
            span.style.left = `${col * cellSize}px`;
            div.appendChild(span);
          }
        }
      }

          const gridPos = startDow + i;

          const cx = col * cellSize + cellSize / 2 + padding + jx;

            date,

            cy,

        // Median threshold
        const activeDays = dataPoints.filter((d) => d.count > 0);
        const activeCounts = activeDays
          .map((d) => d.count)
          .sort((a, b) => a - b);

        // True median (even-length aware)
        let median = 0;

          const mid = Math.floor(activeCounts.length / 2);

              ? (activeCounts[mid - 1] + activeCounts[mid]) / 2

            const sortedActive = [...activeDays].sort(

        const skyW = numCols * cellSize;
        for (let i = 0; i < 80; i++) {
          const cx = noiseSeed() * skyW + padding;
          const cy = noiseSeed() * 112 + padding;
          const r = noiseSeed() * 1.5;
          const del = noiseSeed() * 4;
          const tintRoll = noiseSeed();
          let starFill;
          if (tintRoll < 0.72) starFill = "hsl(0,0%,100%)";
          else if (tintRoll < 0.81) starFill = "hsl(200,45%,88%)";
          else if (tintRoll < 0.88) starFill = "hsl(15,35%,80%)";
          else if (tintRoll < 0.94) starFill = "hsl(130,22%,80%)";
          else starFill = "hsl(268,32%,82%)";
          el += `<circle cx="${cx.toFixed(2)}" cy="${cy.toFixed(2)}" r="${r.toFixed(2)}" class="bg-star" fill="${starFill}" style="animation-delay:-${del.toFixed(2)}s" />`;
        }

        // Comet path (only if 2+ peaks — single peak gets star only, no comet)
        const hasCometPath = hasSufficientPeaks && topDays.length >= 2;
        if (hasCometPath) {
          const pathCoords = topDays.map(
            (d) => `${d.cx.toFixed(2)},${d.cy.toFixed(2)}`,
          );
          const pathD = `M ${pathCoords.join(" L ")}`;

          el += `
            <defs>
              <linearGradient id="${gradId}" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#c8e0ff" stop-opacity="0" />
                <stop offset="30%"  stop-color="#c8e0ff" stop-opacity="0.08" />
                <stop offset="65%"  stop-color="#d8ecff" stop-opacity="0.45" />
                <stop offset="88%"  stop-color="#ffffff" stop-opacity="0.80" />
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.95" />
              </linearGradient>
              <filter id="halo-sm-${variantLetter}" x="-150%" y="-150%" width="400%" height="400%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" />
              </filter>
              <filter id="halo-md-${variantLetter}" x="-150%" y="-150%" width="400%" height="400%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" />
              </filter>
              <filter id="halo-lg-${variantLetter}" x="-200%" y="-200%" width="500%" height="500%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="5.0" />
              </filter>
              <filter id="organic-sphere-${variantLetter}" x="-80%" y="-80%" width="260%" height="260%">
                <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" seed="7" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" result="displaced" />
                <feGaussianBlur in="displaced" stdDeviation="1.4" />
              </filter>
            </defs>
            <path d="${pathD}" class="constellation-path" />
            <path d="${pathD}" class="comet-trail-path" id="${trailId}" stroke="url(#${gradId})" />
            <circle id="${headId}" cx="-10000" cy="-10000" r="4" fill="#ffffff" class="comet-head"
              style="opacity:0;filter: drop-shadow(0 0 5px #ffffff) drop-shadow(0 0 10px rgba(200,224,255,0.9));" />
          `;
        } else {
          // No comet but still need filter defs if there are peaks to render
          el += `
            <defs>
              <filter id="halo-sm-${variantLetter}" x="-150%" y="-150%" width="400%" height="400%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" />
              </filter>
              <filter id="halo-md-${variantLetter}" x="-150%" y="-150%" width="400%" height="400%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" />
              </filter>
              <filter id="halo-lg-${variantLetter}" x="-200%" y="-200%" width="500%" height="500%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="5.0" />
              </filter>
              <filter id="organic-sphere-${variantLetter}" x="-80%" y="-80%" width="260%" height="260%">
                <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" seed="7" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" result="displaced" />
                <feGaussianBlur in="displaced" stdDeviation="1.4" />
              </filter>
            </defs>
          `;
        }

        // Data stars
        dataPoints.forEach((d) => {
          if (d.count <= 0) return;

          if (d.isPeak) {
            const fill = peakFill(d.count);
            let effectiveCount;
            if (isSmallAccount) {
              const relRank = d.count / maxCount;
              const scaleBoost = yearTotal === 1 ? 7 : yearTotal <= 3 ? 6 : 5;
              effectiveCount = 15 + Math.round(relRank * scaleBoost);
            } else {
              effectiveCount = Math.min(d.count, 19);
            }
            const haloR = 3.5 + (effectiveCount - 15) * 0.6;
            const coreR = 0.9 + (effectiveCount - 15) * 0.12;
            const rayLen = 5.0 + (effectiveCount - 15) * 1.0;
            const diagLen = rayLen * 0.45;
            const diagOff = diagLen * 0.707;
            const sphereR = haloR * 0.75;
            const haloFilter = peakHaloFilter(effectiveCount, variantLetter);

            el += `<g transform="rotate(${d.angle.toFixed(1)},${d.cx.toFixed(2)},${d.cy.toFixed(2)})">`;
            el += `<circle class="peak-halo" cx="${d.cx.toFixed(2)}" cy="${d.cy.toFixed(2)}" r="${haloR.toFixed(2)}" fill="hsla(48,100%,74%,0.35)" filter="${haloFilter}" />`;
            el += `<circle class="peak-sphere" cx="${d.cx.toFixed(2)}" cy="${d.cy.toFixed(2)}" r="${sphereR.toFixed(2)}" fill="hsla(50,100%,99%,0.55)" filter="url(#organic-sphere-${variantLetter})" />`;
            el += `<line x1="${(d.cx - diagOff).toFixed(2)}" y1="${(d.cy - diagOff).toFixed(2)}" x2="${(d.cx + diagOff).toFixed(2)}" y2="${(d.cy + diagOff).toFixed(2)}" stroke="${fill}" stroke-width="0.4" stroke-opacity="0.42" stroke-linecap="round" />`;
            el += `<line x1="${(d.cx - diagOff).toFixed(2)}" y1="${(d.cy + diagOff).toFixed(2)}" x2="${(d.cx + diagOff).toFixed(2)}" y2="${(d.cy - diagOff).toFixed(2)}" stroke="${fill}" stroke-width="0.4" stroke-opacity="0.42" stroke-linecap="round" />`;
            el += `<line x1="${(d.cx - rayLen).toFixed(2)}" y1="${d.cy.toFixed(2)}" x2="${(d.cx + rayLen).toFixed(2)}" y2="${d.cy.toFixed(2)}" stroke="${fill}" stroke-width="0.5" stroke-linecap="round" />`;
            el += `<line x1="${d.cx.toFixed(2)}" y1="${(d.cy - rayLen).toFixed(2)}" x2="${d.cx.toFixed(2)}" y2="${(d.cy + rayLen).toFixed(2)}" stroke="${fill}" stroke-width="0.5" stroke-linecap="round" />`;
            el += `<circle class="peak-core" cx="${d.cx.toFixed(2)}" cy="${d.cy.toFixed(2)}" r="${coreR.toFixed(2)}" fill="${fill}" />`;
            el += `</g>`;
          } else {
            if (d.count <= median) return;
            const r = nonPeakR(d.count);
            const fill = nonPeakFill(d.count);
            const opacity = nonPeakOpacity(d.count);
            el += `<circle cx="${d.cx.toFixed(2)}" cy="${d.cy.toFixed(2)}" r="${r.toFixed(2)}" fill="${fill}" opacity="${opacity.toFixed(2)}" class="data-star" />`;
            if (d.shape === "spike") {
              const armLen = r * 2.8;
              const dLen = armLen * 0.45;
              const dOff = dLen * 0.707;
              el += `<g transform="rotate(${d.angle.toFixed(1)},${d.cx.toFixed(2)},${d.cy.toFixed(2)})">`;
              el += `<line x1="${(d.cx - armLen).toFixed(2)}" y1="${d.cy.toFixed(2)}" x2="${(d.cx + armLen).toFixed(2)}" y2="${d.cy.toFixed(2)}" stroke="${fill}" stroke-width="0.6" opacity="${opacity.toFixed(2)}" />`;
              el += `<line x1="${d.cx.toFixed(2)}" y1="${(d.cy - armLen).toFixed(2)}" x2="${d.cx.toFixed(2)}" y2="${(d.cy + armLen).toFixed(2)}" stroke="${fill}" stroke-width="0.6" opacity="${opacity.toFixed(2)}" />`;
              el += `<line x1="${(d.cx - dOff).toFixed(2)}" y1="${(d.cy - dOff).toFixed(2)}" x2="${(d.cx + dOff).toFixed(2)}" y2="${(d.cy + dOff).toFixed(2)}" stroke="${fill}" stroke-width="0.4" stroke-opacity="0.30" stroke-linecap="round" />`;
              el += `<line x1="${(d.cx - dOff).toFixed(2)}" y1="${(d.cy + dOff).toFixed(2)}" x2="${(d.cx + dOff).toFixed(2)}" y2="${(d.cy - dOff).toFixed(2)}" stroke="${fill}" stroke-width="0.4" stroke-opacity="0.30" stroke-linecap="round" />`;
              el += `</g>`;
            }
          }
        });

        svgEl.insertAdjacentHTML("beforeend", el);
        buildMonthLabelsForYear(monthsId, year, numCols);

        // Animate comet (only if 2+ peaks)
        if (!hasCometPath) return;

        const trailEl = document.getElementById(trailId);
        const headEl = document.getElementById(headId);
        const grad = document.getElementById(gradId);
        const pathEl = trailEl;
        const total_len = pathEl.getTotalLength();

        const prefersReduced =
          typeof window.matchMedia === "function" &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        function tick(elapsed) {
          const raw = Math.min(elapsed / DURATION, 1);
          const t = ease(raw);
          const headDist = t * total_len;
          const tailDist = Math.max(0, headDist - TAIL_LEN);

          const hp = pathEl.getPointAtLength(headDist);
          headEl.setAttribute("cx", hp.x);
          headEl.setAttribute("cy", hp.y);

          const visLen = headDist - tailDist;
          trailEl.style.strokeDasharray = `${visLen} ${total_len}`;
          trailEl.style.strokeDashoffset = `-${tailDist}`;

          const tp = pathEl.getPointAtLength(tailDist);
          grad.setAttribute("x1", tp.x);
          grad.setAttribute("y1", tp.y);
          grad.setAttribute("x2", hp.x);
          grad.setAttribute("y2", hp.y);
        }

        function loop() {
          headEl.style.opacity = "1";
          const start = performance.now();
          function frame(now) {
            const elapsed = now - start;
            if (elapsed < DURATION) {
              tick(elapsed);
              requestAnimationFrame(frame);
            } else {
              headEl.setAttribute("cx", -10000);
              headEl.setAttribute("cy", -10000);
              headEl.style.opacity = "0";
              trailEl.style.strokeDasharray = "none";
              setTimeout(loop, HOLD);
            }
          }
          requestAnimationFrame(frame);
        }

        if (!prefersReduced) {
          loop();
        } else {
          trailEl.style.strokeDasharray = "none";
          trailEl.style.strokeDashoffset = "0";
          const sp = pathEl.getPointAtLength(0);
          const ep = pathEl.getPointAtLength(total_len);
          grad.setAttribute("x1", sp.x);
          grad.setAttribute("y1", sp.y);
          grad.setAttribute("x2", ep.x);
          grad.setAttribute("y2", ep.y);
        }
      }

      // ── Render kiaquila into #year-sections ───────────────────────────────
      REAL_HISTORY.forEach((d, i) => renderYearSky(d, i));

      // ── Render Staks-sor into #year-sections-staks ────────────────────────
      STAKS_SOR_HISTORY.forEach((d, i) =>
        renderYearSky(d, i, "year-sections-staks", "staks-"),
      );
    </script>
  </body>
</html>
